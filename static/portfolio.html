<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>持仓跟踪 - StockAI Funnel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #0d1d33 50%, #0a1628 100%);
            min-height: 100vh;
            color: #e6edf3;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 64px;
            background: rgba(13, 29, 51, 0.9);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: fixed;
            height: 100vh;
            z-index: 100;
            transition: width 0.3s ease;
        }

        .sidebar.expanded {
            width: 200px;
            align-items: flex-start;
            padding-left: 16px;
        }

        .sidebar .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #10b981, #06b6d4);
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sidebar .logo:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .nav-items, .tools {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            padding: 0 8px;
        }

        .sidebar.expanded .nav-items, .sidebar.expanded .tools {
            padding: 0;
        }

        .nav-item, .tool-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #86909c;
            text-decoration: none;
        }

        .nav-item:hover, .tool-item:hover {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .nav-item.active {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }

        .nav-item i, .tool-item i {
            font-size: 20px;
            width: 24px;
            text-align: center;
        }

        .nav-item span, .tool-item span {
            font-size: 13px;
            display: none;
        }

        .sidebar.expanded .nav-item span, .sidebar.expanded .tool-item span {
            display: block;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 16px 8px;
        }

        .main-content {
            flex: 1;
            margin-left: 64px;
            padding: 24px;
            transition: margin-left 0.3s ease;
        }

        .sidebar.expanded + .main-content {
            margin-left: 200px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #10b981, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .section {
            background: rgba(13, 29, 51, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #e6edf3;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-card.positive {
            border-color: rgba(239, 68, 68, 0.3);
        }

        .stat-card.negative {
            border-color: rgba(16, 185, 129, 0.3);
        }

        .stat-label {
            font-size: 12px;
            color: #86909c;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #e6edf3;
        }

        .stat-value.positive {
            color: #ef4444;
        }

        .stat-value.negative {
            color: #10b981;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981, #06b6d4);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #e6edf3;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .portfolio-table {
            width: 100%;
            border-collapse: collapse;
        }

        .portfolio-table th, .portfolio-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .portfolio-table th {
            font-size: 12px;
            color: #86909c;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .portfolio-table tr:hover {
            background: rgba(16, 185, 129, 0.05);
        }

        .portfolio-table .profit {
            color: #ef4444;
            font-weight: 600;
        }

        .portfolio-table .loss {
            color: #10b981;
            font-weight: 600;
        }

        .signal-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }

        .signal-tag.buy {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .signal-tag.sell {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        .signal-tag.hold {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: rgba(13, 29, 51, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 24px;
            width: 90%;
            max-width: 480px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-close {
            font-size: 24px;
            cursor: pointer;
            color: #86909c;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #e6edf3;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #86909c;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #e6edf3;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: #10b981;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .alert-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 3px solid;
        }

        .alert-item.warning {
            border-left-color: #fbbf24;
        }

        .alert-item.danger {
            border-left-color: #ef4444;
        }

        .alert-item.success {
            border-left-color: #10b981;
        }

        .alert-icon {
            font-size: 20px;
        }

        .alert-content {
            flex: 1;
        }

        .alert-title {
            font-size: 14px;
            font-weight: 500;
            color: #e6edf3;
            margin-bottom: 4px;
        }

        .alert-desc {
            font-size: 12px;
            color: #86909c;
        }

        .badge {
            position: relative;
        }

        .badge::after {
            content: '';
            position: absolute;
            top: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            border: 2px solid rgba(13, 29, 51, 0.9);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="logo" id="toggleSidebar">📊</div>
            <div class="nav-items">
                <a href="/" class="nav-item" id="nav-home">
                    <i>🏠</i>
                    <span>首页仪表盘</span>
                </a>
                <a href="/macro" class="nav-item" id="nav-macro">
                    <i>📈</i>
                    <span>个股诊股</span>
                </a>
                <a href="/market" class="nav-item" id="nav-market">
                    <i>📊</i>
                    <span>市场主线</span>
                </a>
                <a href="/backtest" class="nav-item" id="nav-backtest">
                    <i>🔬</i>
                    <span>策略回测</span>
                </a>
                <a href="/portfolio" class="nav-item active badge" id="nav-portfolio">
                    <i>💼</i>
                    <span>持仓跟踪</span>
                </a>
            </div>
            <div class="divider"></div>
            <div class="tools">
                <div class="tool-item" id="tool-config" onclick="showConfig()">
                    <i>⚙️</i>
                    <span>系统配置</span>
                </div>
                <div class="tool-item" id="tool-logs" onclick="showLogs()">
                    <i>📜</i>
                    <span>数据日志</span>
                </div>
                <div class="tool-item" id="tool-sync" onclick="syncData()">
                    <i>🔄</i>
                    <span>数据同步</span>
                </div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="header">
                <div>
                    <h1>持仓跟踪</h1>
                    <p style="color: #86909c; font-size: 14px; margin-top: 4px;">实时监控持仓股票，及时获取信号更新与风险提醒</p>
                </div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div style="padding: 8px 16px; background: rgba(16, 185, 129, 0.15); border-radius: 8px; font-size: 13px; color: #10b981;">
                        🟢 系统在线
                    </div>
                    <button class="btn btn-primary" onclick="showAddStockModal()">
                        + 添加股票
                    </button>
                </div>
            </div>

            <div class="stats-bar">
                <div class="stat-card">
                    <div class="stat-label">持仓总市值</div>
                    <div class="stat-value" id="totalValue">--</div>
                </div>
                <div class="stat-card positive">
                    <div class="stat-label">总盈亏</div>
                    <div class="stat-value positive" id="totalProfit">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">持仓数量</div>
                    <div class="stat-value" id="stockCount">--</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">今日信号</div>
                    <div class="stat-value" id="todaySignals">--</div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <div class="section-title">持仓列表</div>
                    <button class="btn btn-secondary" onclick="refreshPortfolio()">
                        🔄 刷新
                    </button>
                </div>
                <table class="portfolio-table" id="portfolioTable">
                    <thead>
                        <tr>
                            <th>股票代码</th>
                            <th>股票名称</th>
                            <th>持仓数量</th>
                            <th>成本价</th>
                            <th>现价</th>
                            <th>盈亏</th>
                            <th>持仓市值</th>
                            <th>最新信号</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="9" style="text-align: center; color: #86909c;">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="section">
                <div class="section-header">
                    <div class="section-title">信号提醒</div>
                </div>
                <div id="alertsContainer">
                    <div style="text-align: center; color: #86909c; padding: 20px;">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addStockModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">添加持仓股票</div>
                <div class="modal-close" onclick="closeAddStockModal()">×</div>
            </div>
            <div>
                <div class="form-group">
                    <label>股票代码</label>
                    <input type="text" id="stockCode" placeholder="如: 000001.SZ">
                </div>
                <div class="form-group">
                    <label>持仓数量</label>
                    <input type="number" id="stockQuantity" placeholder="持仓数量">
                </div>
                <div class="form-group">
                    <label>成本价</label>
                    <input type="number" step="0.01" id="stockCost" placeholder="持仓成本">
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" onclick="closeAddStockModal()">取消</button>
                    <button class="btn btn-primary" onclick="addStock()">确认添加</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('toggleSidebar').addEventListener('click', () => {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('expanded');
            localStorage.setItem('sidebarExpanded', sidebar.classList.contains('expanded'));
        });

        if (localStorage.getItem('sidebarExpanded') === 'true') {
            document.getElementById('sidebar').classList.add('expanded');
        }

        async function loadPortfolio() {
            try {
                const response = await fetch('/api/portfolio');
                const data = await response.json();
                
                document.getElementById('totalValue').textContent = `¥${data.total_value.toLocaleString()}`;
                document.getElementById('totalProfit').textContent = `${data.total_profit >= 0 ? '+' : ''}${data.total_profit.toLocaleString()}`;
                document.getElementById('totalProfit').className = `stat-value ${data.total_profit >= 0 ? 'positive' : 'negative'}`;
                document.getElementById('stockCount').textContent = data.count;
                document.getElementById('todaySignals').textContent = data.today_signals;
                
                displayPortfolio(data.holdings);
                displayAlerts(data.alerts);
            } catch (error) {
                console.error('Failed to load portfolio:', error);
            }
        }

        function displayPortfolio(holdings) {
            const tbody = document.querySelector('#portfolioTable tbody');
            tbody.innerHTML = '';
            
            holdings.forEach(stock => {
                const row = document.createElement('tr');
                const profitClass = stock.profit >= 0 ? 'profit' : 'loss';
                const signalClass = stock.signal === '买入' ? 'buy' : stock.signal === '卖出' ? 'sell' : 'hold';
                
                row.innerHTML = `
                    <td>${stock.ts_code}</td>
                    <td style="font-weight: 500;">${stock.name}</td>
                    <td>${stock.quantity}</td>
                    <td>¥${stock.cost.toFixed(2)}</td>
                    <td>¥${stock.current_price.toFixed(2)}</td>
                    <td class="${profitClass}">${stock.profit >= 0 ? '+' : ''}¥${stock.profit.toFixed(2)} (${stock.profit_pct >= 0 ? '+' : ''}${stock.profit_pct.toFixed(2)}%)</td>
                    <td>¥${stock.market_value.toFixed(2)}</td>
                    <td><span class="signal-tag ${signalClass}">${stock.signal}</span></td>
                    <td>
                        <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" onclick="removeStock('${stock.ts_code}')">删除</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function displayAlerts(alerts) {
            const container = document.getElementById('alertsContainer');
            container.innerHTML = '';
            
            alerts.forEach(alert => {
                const alertDiv = document.createElement('div');
                alertDiv.className = `alert-item ${alert.level}`;
                alertDiv.innerHTML = `
                    <div class="alert-icon">${alert.level === 'warning' ? '⚠️' : alert.level === 'danger' ? '🔴' : '🟢'}</div>
                    <div class="alert-content">
                        <div class="alert-title">${alert.title}</div>
                        <div class="alert-desc">${alert.description} · ${alert.time}</div>
                    </div>
                `;
                container.appendChild(alertDiv);
            });
        }

        function showAddStockModal() {
            document.getElementById('addStockModal').classList.add('show');
        }

        function closeAddStockModal() {
            document.getElementById('addStockModal').classList.remove('show');
            document.getElementById('stockCode').value = '';
            document.getElementById('stockQuantity').value = '';
            document.getElementById('stockCost').value = '';
        }

        async function addStock() {
            const ts_code = document.getElementById('stockCode').value.trim();
            const quantity = parseInt(document.getElementById('stockQuantity').value);
            const cost = parseFloat(document.getElementById('stockCost').value);
            
            if (!ts_code || !quantity || !cost) {
                alert('请填写完整信息');
                return;
            }
            
            try {
                await fetch('/api/portfolio/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ts_code, quantity, cost })
                });
                closeAddStockModal();
                loadPortfolio();
            } catch (error) {
                console.error('Failed to add stock:', error);
            }
        }

        async function removeStock(ts_code) {
            if (!confirm(`确定删除 ${ts_code} 吗？`)) return;
            
            try {
                await fetch(`/api/portfolio/remove/${ts_code}`, { method: 'DELETE' });
                loadPortfolio();
            } catch (error) {
                console.error('Failed to remove stock:', error);
            }
        }

        function refreshPortfolio() {
            loadPortfolio();
        }

        function showConfig() {
            alert('系统配置功能开发中...');
        }

        function showLogs() {
            alert('数据日志功能开发中...');
        }

        function syncData() {
            alert('数据同步功能开发中...');
        }

        loadPortfolio();
        setInterval(loadPortfolio, 60000);
    </script>
</body>
</html>
