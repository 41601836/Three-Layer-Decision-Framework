<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市场主线分析 - StockAI Funnel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a1628 0%, #0d1d33 50%, #0a1628 100%);
            min-height: 100vh;
            color: #e6edf3;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 64px;
            background: rgba(13, 29, 51, 0.9);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: fixed;
            height: 100vh;
            z-index: 100;
            transition: width 0.3s ease;
        }

        .sidebar.expanded {
            width: 200px;
            align-items: flex-start;
            padding-left: 16px;
        }

        .sidebar .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #10b981, #06b6d4);
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sidebar .logo:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .nav-items, .tools {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            padding: 0 8px;
        }

        .sidebar.expanded .nav-items, .sidebar.expanded .tools {
            padding: 0;
        }

        .nav-item, .tool-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #86909c;
            text-decoration: none;
        }

        .nav-item:hover, .tool-item:hover {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }

        .nav-item.active {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }

        .nav-item i, .tool-item i {
            font-size: 20px;
            width: 24px;
            text-align: center;
        }

        .nav-item span, .tool-item span {
            font-size: 13px;
            display: none;
        }

        .sidebar.expanded .nav-item span, .sidebar.expanded .tool-item span {
            display: block;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 16px 8px;
        }

        .main-content {
            flex: 1;
            margin-left: 64px;
            padding: 24px;
            transition: margin-left 0.3s ease;
        }

        .sidebar.expanded + .main-content {
            margin-left: 200px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #10b981, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            flex: 1;
            background: rgba(13, 29, 51, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(16, 185, 129, 0.3);
            transform: translateY(-2px);
        }

        .stat-info {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 13px;
            color: #86909c;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #e6edf3;
        }

        .stat-value.positive {
            color: #ef4444;
        }

        .stat-value.negative {
            color: #10b981;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .stat-icon.up {
            background: rgba(239, 68, 68, 0.15);
        }

        .stat-icon.down {
            background: rgba(16, 185, 129, 0.15);
        }

        .stat-icon.neutral {
            background: rgba(134, 144, 156, 0.15);
        }

        .section {
            background: rgba(13, 29, 51, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #e6edf3;
        }

        .section-subtitle {
            font-size: 13px;
            color: #86909c;
            margin-top: 4px;
        }

        .tabs {
            display: flex;
            gap: 8px;
        }

        .tab {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #86909c;
            background: transparent;
        }

        .tab.active {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        .tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
        }

        .industry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
        }

        .industry-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .industry-card:hover {
            border-color: rgba(16, 185, 129, 0.3);
            transform: translateY(-2px);
        }

        .industry-card.strong {
            border-color: rgba(16, 185, 129, 0.4);
            background: rgba(16, 185, 129, 0.05);
        }

        .industry-card.weak {
            border-color: rgba(239, 68, 68, 0.4);
            background: rgba(239, 68, 68, 0.05);
        }

        .industry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .industry-name {
            font-size: 14px;
            font-weight: 600;
            color: #e6edf3;
        }

        .industry-change {
            font-size: 14px;
            font-weight: 600;
        }

        .industry-change.positive {
            color: #ef4444;
        }

        .industry-change.negative {
            color: #10b981;
        }

        .industry-metrics {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #86909c;
        }

        .industry-metrics span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .flow-chart {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .flow-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .flow-item:hover {
            border-color: rgba(16, 185, 129, 0.3);
        }

        .flow-rank {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        .flow-rank.top3 {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #000;
        }

        .flow-info {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .flow-name {
            font-size: 14px;
            color: #e6edf3;
            font-weight: 500;
        }

        .flow-desc {
            font-size: 12px;
            color: #86909c;
        }

        .flow-amount {
            font-size: 14px;
            font-weight: 600;
            color: #ef4444;
        }

        .flow-amount.out {
            color: #10b981;
        }

        .rotation-table {
            width: 100%;
            border-collapse: collapse;
        }

        .rotation-table th, .rotation-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .rotation-table th {
            font-size: 12px;
            color: #86909c;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .rotation-table tr:hover {
            background: rgba(16, 185, 129, 0.05);
        }

        .rotation-table .name {
            font-weight: 500;
            color: #e6edf3;
        }

        .rotation-table .value {
            font-weight: 600;
        }

        .rotation-table .value.up {
            color: #ef4444;
        }

        .rotation-table .value.down {
            color: #10b981;
        }

        .rotation-table .trend {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .rotation-table .trend.strengthen {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .rotation-table .trend.weakening {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: #86909c;
        }

        .loading::after {
            content: '';
            width: 24px;
            height: 24px;
            border: 2px solid rgba(16, 185, 129, 0.3);
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .badge {
            position: relative;
        }

        .badge::after {
            content: '';
            position: absolute;
            top: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            background: #ef4444;
            border-radius: 50%;
            border: 2px solid rgba(13, 29, 51, 0.9);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="logo" id="toggleSidebar">📊</div>
            <div class="nav-items">
                <a href="/" class="nav-item" id="nav-home">
                    <i>🏠</i>
                    <span>首页仪表盘</span>
                </a>
                <a href="/macro" class="nav-item" id="nav-macro">
                    <i>📈</i>
                    <span>个股诊股</span>
                </a>
                <a href="/market" class="nav-item active" id="nav-market">
                    <i>📊</i>
                    <span>市场主线</span>
                </a>
                <a href="/backtest" class="nav-item" id="nav-backtest">
                    <i>🔬</i>
                    <span>策略回测</span>
                </a>
                <a href="/portfolio" class="nav-item badge" id="nav-portfolio">
                    <i>💼</i>
                    <span>持仓跟踪</span>
                </a>
            </div>
            <div class="divider"></div>
            <div class="tools">
                <div class="tool-item" id="tool-config" onclick="showConfig()">
                    <i>⚙️</i>
                    <span>系统配置</span>
                </div>
                <div class="tool-item" id="tool-logs" onclick="showLogs()">
                    <i>📜</i>
                    <span>数据日志</span>
                </div>
                <div class="tool-item" id="tool-sync" onclick="syncData()">
                    <i>🔄</i>
                    <span>数据同步</span>
                </div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="header">
                <div>
                    <h1>市场主线分析</h1>
                    <p style="color: #86909c; font-size: 14px; margin-top: 4px;">实时跟踪板块轮动与资金流向，把握市场脉搏</p>
                </div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div style="padding: 8px 16px; background: rgba(16, 185, 129, 0.15); border-radius: 8px; font-size: 13px; color: #10b981;">
                        🟢 系统在线
                    </div>
                    <div id="updateTime" style="font-size: 13px; color: #86909c;">
                        更新时间: --:--:--
                    </div>
                </div>
            </div>

            <div class="stats-bar">
                <div class="stat-card">
                    <div class="stat-info">
                        <span class="stat-label">上涨家数</span>
                        <span class="stat-value positive" id="upCount">--</span>
                    </div>
                    <div class="stat-icon up">📈</div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <span class="stat-label">下跌家数</span>
                        <span class="stat-value negative" id="downCount">--</span>
                    </div>
                    <div class="stat-icon down">📉</div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <span class="stat-label">平盘家数</span>
                        <span class="stat-value" id="flatCount">--</span>
                    </div>
                    <div class="stat-icon neutral">➡️</div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <span class="stat-label">北向资金</span>
                        <span class="stat-value" id="northFlow">--</span>
                    </div>
                    <div class="stat-icon up">💰</div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <div>
                        <div class="section-title">板块资金流向</div>
                        <div class="section-subtitle">实时跟踪主力资金动向</div>
                    </div>
                    <div class="tabs">
                        <div class="tab active" data-tab="inflow">资金流入</div>
                        <div class="tab" data-tab="outflow">资金流出</div>
                    </div>
                </div>
                <div class="flow-chart" id="flowChart">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <div>
                        <div class="section-title">行业强度排行</div>
                        <div class="section-subtitle">基于涨幅、量能、资金的综合评分</div>
                    </div>
                    <div class="tabs">
                        <div class="tab active" data-tab="day">今日</div>
                        <div class="tab" data-tab="week">近5日</div>
                        <div class="tab" data-tab="month">近20日</div>
                    </div>
                </div>
                <div class="industry-grid" id="industryGrid">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <div>
                        <div class="section-title">板块轮动追踪</div>
                        <div class="section-subtitle">监测板块强弱转换，捕捉热点切换</div>
                    </div>
                </div>
                <table class="rotation-table" id="rotationTable">
                    <thead>
                        <tr>
                            <th>行业</th>
                            <th>今日涨幅</th>
                            <th>5日涨幅</th>
                            <th>20日涨幅</th>
                            <th>资金流向</th>
                            <th>趋势</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="6" style="text-align: center; color: #86909c;">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('toggleSidebar').addEventListener('click', () => {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('expanded');
            localStorage.setItem('sidebarExpanded', sidebar.classList.contains('expanded'));
        });

        if (localStorage.getItem('sidebarExpanded') === 'true') {
            document.getElementById('sidebar').classList.add('expanded');
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                tab.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const parentSection = tab.closest('.section');
                if (parentSection.querySelector('.tabs').querySelector('.tab.active').dataset.tab === 'day') {
                    loadIndustryData('day');
                } else if (parentSection.querySelector('.tabs').querySelector('.tab.active').dataset.tab === 'week') {
                    loadIndustryData('week');
                } else if (parentSection.querySelector('.tabs').querySelector('.tab.active').dataset.tab === 'month') {
                    loadIndustryData('month');
                }
                if (tab.dataset.tab === 'inflow') {
                    loadFlowData('inflow');
                } else if (tab.dataset.tab === 'outflow') {
                    loadFlowData('outflow');
                }
            });
        });

        async function loadMarketStats() {
            try {
                const response = await fetch('/api/market_stats');
                const data = await response.json();
                
                document.getElementById('upCount').textContent = data.up_count.toLocaleString();
                document.getElementById('downCount').textContent = data.down_count.toLocaleString();
                document.getElementById('flatCount').textContent = data.flat_count.toLocaleString();
                
                const northFlow = parseFloat(data.north_flow);
                document.getElementById('northFlow').textContent = 
                    northFlow >= 0 ? `+${northFlow.toFixed(2)}亿` : `${northFlow.toFixed(2)}亿`;
                document.getElementById('northFlow').className = `stat-value ${northFlow >= 0 ? 'positive' : 'negative'}`;
                
                document.getElementById('updateTime').textContent = `更新时间: ${data.update_time}`;
            } catch (error) {
                console.error('Failed to load market stats:', error);
            }
        }

        async function loadFlowData(type = 'inflow') {
            try {
                const response = await fetch(`/api/industry_flow?type=${type}`);
                const data = await response.json();
                
                const chart = document.getElementById('flowChart');
                chart.innerHTML = '';
                
                data.forEach((item, index) => {
                    const isOutflow = type === 'outflow';
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'flow-item';
                    itemDiv.innerHTML = `
                        <div class="flow-rank ${index < 3 ? 'top3' : ''}">${index + 1}</div>
                        <div class="flow-info">
                            <div class="flow-name">${item.name}</div>
                            <div class="flow-desc">${item.stock_count}只股票 · ${item.avg_change > 0 ? '上涨' : '下跌'}</div>
                        </div>
                        <div class="flow-amount ${isOutflow ? 'out' : ''}">
                            ${isOutflow ? '-' : '+'}${item.amount.toFixed(2)}亿
                        </div>
                    `;
                    chart.appendChild(itemDiv);
                });
            } catch (error) {
                console.error('Failed to load flow data:', error);
            }
        }

        async function loadIndustryData(period = 'day') {
            try {
                const response = await fetch(`/api/industry_strength?period=${period}`);
                const data = await response.json();
                
                const grid = document.getElementById('industryGrid');
                grid.innerHTML = '';
                
                data.forEach(item => {
                    const card = document.createElement('div');
                    const isPositive = item.change > 0;
                    const strength = item.score >= 70 ? 'strong' : item.score <= 30 ? 'weak' : '';
                    card.className = `industry-card ${strength}`;
                    
                    const tierBadge = item.tier === 'main' 
                        ? '<span style="background:rgba(239, 68, 68, 0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3);padding:2px 6px;border-radius:4px;font-size:10px;margin-left:6px;font-weight:bold;">⭐ 主线</span>' 
                        : item.tier === 'backup' 
                            ? '<span style="background:rgba(251, 191, 36, 0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3);padding:2px 6px;border-radius:4px;font-size:10px;margin-left:6px;font-weight:bold;">备选</span>' 
                            : '';
                            
                    card.innerHTML = `
                        <div class="industry-header">
                            <span class="industry-name">${item.name}${tierBadge}</span>
                            <span class="industry-change ${isPositive ? 'positive' : 'negative'}">
                                ${isPositive ? '+' : ''}${item.change.toFixed(2)}%
                            </span>
                        </div>
                        <div class="industry-metrics">
                            <span>📊 评分: ${item.score}</span>
                            <span>📈 ${item.stock_count}只</span>
                            <span>💰 ${item.volume.toFixed(0)}亿</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Failed to load industry data:', error);
            }
        }

        async function loadRotationData() {
            try {
                const response = await fetch('/api/rotation');
                const data = await response.json();
                
                const tbody = document.querySelector('#rotationTable tbody');
                tbody.innerHTML = '';
                
                data.forEach(item => {
                    const row = document.createElement('tr');
                    const trendClass = item.trend === 'strengthen' ? 'strengthen' : 'weakening';
                    row.innerHTML = `
                        <td class="name">${item.name}</td>
                        <td class="value ${item.day_change > 0 ? 'up' : 'down'}">${item.day_change > 0 ? '+' : ''}${item.day_change.toFixed(2)}%</td>
                        <td class="value ${item.week_change > 0 ? 'up' : 'down'}">${item.week_change > 0 ? '+' : ''}${item.week_change.toFixed(2)}%</td>
                        <td class="value ${item.month_change > 0 ? 'up' : 'down'}">${item.month_change > 0 ? '+' : ''}${item.month_change.toFixed(2)}%</td>
                        <td class="value ${item.flow > 0 ? 'up' : 'down'}">${item.flow > 0 ? '+' : ''}${item.flow.toFixed(2)}亿</td>
                        <td><span class="trend ${trendClass}">${item.trend === 'strengthen' ? '💪 走强' : '📉 走弱'}</span></td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Failed to load rotation data:', error);
            }
        }

        function showConfig() {
            alert('系统配置功能开发中...');
        }

        function showLogs() {
            alert('数据日志功能开发中...');
        }

        function syncData() {
            const btn = document.getElementById('tool-sync');
            btn.style.opacity = '0.5';
            btn.innerHTML = '<i>⏳</i><span>同步中...</span>';
            fetch('/api/sync_data')
                .then(() => {
                    btn.style.opacity = '1';
                    btn.innerHTML = '<i>🔄</i><span>数据同步</span>';
                    loadMarketStats();
                    loadFlowData();
                    loadIndustryData();
                    loadRotationData();
                    alert('数据同步完成！');
                })
                .catch(() => {
                    btn.style.opacity = '1';
                    btn.innerHTML = '<i>🔄</i><span>数据同步</span>';
                    alert('同步失败，请重试');
                });
        }

        loadMarketStats();
        loadFlowData();
        loadIndustryData();
        loadRotationData();

        setInterval(loadMarketStats, 30000);
    </script>
</body>
</html>
